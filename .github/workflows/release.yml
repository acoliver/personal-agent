name: Release (macOS arm64 + Linux x86_64)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (vX.Y.Z)"
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build + sign + publish + update tap (macOS)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Resolve release tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like vX.Y.Z (received: ${release_tag})"
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN}" ]; then
            echo "Missing required secret HOMEBREW_TAP_GITHUB_TOKEN"
            exit 1
          fi

      - name: Build, sign, and package arm64 artifact
        run: scripts/release/package_macos_arm64.sh "${{ steps.tag.outputs.release_tag }}"

      - name: Gather artifact metadata
        id: meta
        run: |
          set -euo pipefail
          artifact_dir="artifacts/release"
          asset_name="$(cat "${artifact_dir}/asset_name.txt")"
          asset_path="$(cat "${artifact_dir}/asset_path.txt")"
          sha256="$(cat "${artifact_dir}/sha256.txt")"

          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"
          echo "asset_path=${asset_path}" >> "$GITHUB_OUTPUT"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_tag="${{ steps.tag.outputs.release_tag }}"
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" \
              "${{ steps.meta.outputs.asset_path }}" \
              artifacts/release/SHA256SUMS.txt \
              --clobber
          else
            gh release create "${release_tag}" \
              --verify-tag \
              "${{ steps.meta.outputs.asset_path }}" \
              artifacts/release/SHA256SUMS.txt \
              --title "${release_tag}" \
              --generate-notes
          fi

      - name: Update Homebrew tap formula
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          HOMEBREW_TAP_REPO: acoliver/homebrew-tap
          HOMEBREW_FORMULA_NAME: personal-agent
        run: |
          set -euo pipefail
          scripts/release/update_homebrew_tap.sh \
            "${{ steps.tag.outputs.release_tag }}" \
            "${{ steps.meta.outputs.asset_name }}" \
            "${{ steps.meta.outputs.sha256 }}"

  # Linux release job - builds .deb, .rpm, and .zip artifacts
  # No additional secrets required - uploads go to GitHub Releases using GITHUB_TOKEN
  linux-release:
    name: Build + package (Linux x86_64)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            curl \
            gcc \
            g++ \
            git \
            jq \
            libdbus-1-dev \
            libasound2-dev \
            libfontconfig-dev \
            libgit2-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            llvm \
            lld \
            make \
            pkg-config \
            pipewire \
            xdg-desktop-portal

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Resolve release tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like vX.Y.Z (received: ${release_tag})"
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Build and package Linux artifacts
        run: scripts/release/package_linux_x86_64.sh "${{ steps.tag.outputs.release_tag }}"

      - name: Gather artifact metadata
        id: meta
        run: |
          set -euo pipefail
          artifact_dir="artifacts/release"

          deb_name="$(cat "${artifact_dir}/deb_name.txt")"
          deb_path="$(cat "${artifact_dir}/deb_path.txt")"
          deb_sha="$(cat "${artifact_dir}/deb_sha256.txt")"

          rpm_name="$(cat "${artifact_dir}/rpm_name.txt")"
          rpm_path="$(cat "${artifact_dir}/rpm_path.txt")"
          rpm_sha="$(cat "${artifact_dir}/rpm_sha256.txt")"

          zip_name="$(cat "${artifact_dir}/zip_name.txt")"
          zip_path="$(cat "${artifact_dir}/zip_path.txt")"
          zip_sha="$(cat "${artifact_dir}/zip_sha256.txt")"

          echo "deb_name=${deb_name}" >> "$GITHUB_OUTPUT"
          echo "deb_path=${deb_path}" >> "$GITHUB_OUTPUT"
          echo "deb_sha=${deb_sha}" >> "$GITHUB_OUTPUT"

          echo "rpm_name=${rpm_name}" >> "$GITHUB_OUTPUT"
          echo "rpm_path=${rpm_path}" >> "$GITHUB_OUTPUT"
          echo "rpm_sha=${rpm_sha}" >> "$GITHUB_OUTPUT"

          echo "zip_name=${zip_name}" >> "$GITHUB_OUTPUT"
          echo "zip_path=${zip_path}" >> "$GITHUB_OUTPUT"
          echo "zip_sha=${zip_sha}" >> "$GITHUB_OUTPUT"

      - name: Upload Linux artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_tag="${{ steps.tag.outputs.release_tag }}"

          # Wait for release to exist (macOS job creates it, or create if needed)
          for i in {1..30}; do
            if gh release view "${release_tag}" >/dev/null 2>&1; then
              echo "Release ${release_tag} found"
              break
            fi
            echo "Waiting for release ${release_tag} to be created..."
            sleep 10
          done

          # Upload all Linux artifacts
          gh release upload "${release_tag}" \
            "${{ steps.meta.outputs.deb_path }}" \
            "${{ steps.meta.outputs.rpm_path }}" \
            "${{ steps.meta.outputs.zip_path }}" \
            artifacts/release/SHA256SUMS.txt \
            --clobber || {
              # If release doesn't exist yet, create it
              gh release create "${release_tag}" \
                --verify-tag \
                "${{ steps.meta.outputs.deb_path }}" \
                "${{ steps.meta.outputs.rpm_path }}" \
                "${{ steps.meta.outputs.zip_path }}" \
                artifacts/release/SHA256SUMS.txt \
                --title "${release_tag}" \
                --generate-notes
            }
