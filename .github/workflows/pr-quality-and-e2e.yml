name: PR Quality and Real E2E

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  fmt:
    name: Format (rustfmt)
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Lint (clippy + structural)
    runs-on: macos-14
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Install complexity tooling (lizard)
        run: |
          set -euo pipefail
          python3 -m venv .venv-lizard
          . .venv-lizard/bin/activate
          python -m pip install --upgrade pip
          python -m pip install lizard

      - name: Run structural quality checks (complexity + file length)
        run: |
          set -euo pipefail
          . .venv-lizard/bin/activate

          python -m lizard -C 50 -L 100 -w src/ \
            --exclude "src/ui_gpui/views/*" \
            --exclude "src/ui_gpui/components/*" \
            --exclude "src/main_gpui.rs" \
            --exclude "src/bin/*" \
            --exclude "src/services/chat.rs" \
            --exclude "src/llm/client_agent.rs"

          error_exit=0
          while IFS= read -r file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 1000 ]; then
              echo "ERROR: $file has $lines lines (max 1000)"
              error_exit=1
            elif [ "$lines" -gt 750 ]; then
              echo "WARNING: $file has $lines lines (recommended max 750)"
            fi
          done < <(
            find src -name "*.rs" \
              -not -path "src/ui_gpui/views/*" \
              -not -path "src/ui_gpui/components/*" \
              -not -path "src/main_gpui.rs" \
              -not -path "src/bin/*" | sort
          )

          if [ "$error_exit" -eq 1 ]; then
            exit 1
          fi

  test:
    name: Tests (lib + integration)
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Run library and integration tests
        run: cargo test --lib --tests

  coverage:
    name: Coverage (llvm-cov report)
    runs-on: macos-14
    needs:
      - fmt
      - lint
      - test
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage summary (workspace scoped)
        run: |
          set -euo pipefail

          HOST_TRIPLE="$(rustc -vV | awk '/^host: /{print $2}')"
          LLVM_BIN="$(rustc --print sysroot)/lib/rustlib/${HOST_TRIPLE}/bin"
          export LLVM_COV="${LLVM_BIN}/llvm-cov"
          export LLVM_PROFDATA="${LLVM_BIN}/llvm-profdata"

          IGNORE_REGEX='research/serdesAI/|src/main_gpui.rs|src/bin/|src/llm/client_agent.rs|src/ui_gpui/popup_window.rs|src/ui_gpui/tray_bridge.rs|src/ui_gpui/navigation_channel.rs|src/ui_gpui/selection_intent_channel.rs'

          cargo llvm-cov clean --workspace
          cargo llvm-cov --no-report --lib --tests -q

          mkdir -p target/llvm-cov-target
          cargo llvm-cov report --summary-only --ignore-filename-regex "$IGNORE_REGEX"
          cargo llvm-cov report \
            --json \
            --summary-only \
            --skip-functions \
            --ignore-filename-regex "$IGNORE_REGEX" \
            --output-path target/llvm-cov-target/workspace-summary.json

      - name: Upload coverage summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace-summary
          path: target/llvm-cov-target/workspace-summary.json

  real-e2e:
    name: Real ignored E2E (PA_E2E contract)
    runs-on: macos-14
    needs:
      - fmt
      - lint
      - test
      - coverage
    timeout-minutes: 60
    env:
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      PA_E2E_PROVIDER_ID: ${{ vars.PA_E2E_PROVIDER_ID }}
      PA_E2E_MODEL_ID: ${{ vars.PA_E2E_MODEL_ID }}
      PA_E2E_BASE_URL: ${{ vars.PA_E2E_BASE_URL }}
      PA_E2E_KEY_LABEL: ${{ vars.PA_E2E_KEY_LABEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Resolve PA_E2E defaults
        run: |
          set -euo pipefail
          if [ -z "${OLLAMA_API_KEY}" ]; then
            echo "Missing required secret OLLAMA_API_KEY"
            exit 1
          fi

          E2E_PROVIDER_ID="${PA_E2E_PROVIDER_ID:-ollama}"
          E2E_MODEL_ID="${PA_E2E_MODEL_ID:-minimax-m2.7:cloud}"
          E2E_BASE_URL="${PA_E2E_BASE_URL:-https://ollama.com/v1}"
          E2E_KEY_LABEL="${PA_E2E_KEY_LABEL:-pa-e2e-ollama-cloud}"

          {
            echo "PA_E2E_PROVIDER_ID=${E2E_PROVIDER_ID}"
            echo "PA_E2E_MODEL_ID=${E2E_MODEL_ID}"
            echo "PA_E2E_BASE_URL=${E2E_BASE_URL}"
            echo "PA_E2E_KEY_LABEL=${E2E_KEY_LABEL}"
            echo "PA_E2E_API_KEY=${OLLAMA_API_KEY}"
          } >> "$GITHUB_ENV"

      - name: Seed secure store label for fallback auth path
        run: |
          set -euo pipefail
          security add-generic-password -U -a "apikey:$PA_E2E_KEY_LABEL" -s personal-agent -w "$PA_E2E_API_KEY"

      - name: Verify secure store label
        run: |
          set -euo pipefail
          security find-generic-password -a "apikey:$PA_E2E_KEY_LABEL" -s personal-agent -w >/dev/null

      - name: Run ignored real E2E tests
        run: |
          set -euo pipefail
          cargo test --test e2e_chat_synthetic -- --ignored --nocapture
          cargo test --test e2e_agent_tool_execution -- --ignored --nocapture
          cargo test --test e2e_real_tool_execution -- --ignored --nocapture
          cargo test --test e2e_install_and_search -- --ignored --nocapture
          cargo test --test e2e_presenter_chat -- --ignored --nocapture
