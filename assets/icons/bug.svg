<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
  <!-- Head -->
  <circle cx="8" cy="4" r="2"/>
  <!-- Antennae -->
  <line x1="6.5" y1="2.5" x2="4" y2="0.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <line x1="9.5" y1="2.5" x2="12" y2="0.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- Body (oval) -->
  <ellipse cx="8" cy="10" rx="4" ry="4.5"/>
  <!-- Wing seam -->
  <line x1="8" y1="6" x2="8" y2="14" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Legs (3 pairs) -->
  <line x1="4.5" y1="7.5" x2="2" y2="6" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="11.5" y1="7.5" x2="14" y2="6" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="4" y1="10" x2="1.5" y2="10" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="12" y1="10" x2="14.5" y2="10" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="4.5" y1="12.5" x2="2.5" y2="14" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="11.5" y1="12.5" x2="13.5" y2="14" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
</svg>
